<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cocina — Mesa</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
html,body{height:100%;background:#0c0c0c;color:#f0f0f0;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#080808;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-name{font-size:15px;font-weight:500}
.tb-right{display:flex;align-items:center;gap:10px}
.live-badge{display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #1a4f35;background:#0d2e1e;color:#3ecf8e}
.pulse{width:6px;height:6px;border-radius:50%;background:#3ecf8e;animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.clock{font-size:14px;font-weight:500;font-variant-numeric:tabular-nums}
.btn-sm{padding:5px 11px;border:1px solid #222;border-radius:8px;background:transparent;color:#555;font-size:11px;cursor:pointer;transition:all .15s}
.btn-sm:hover{border-color:#444;color:#aaa}
.btn-sm.active{border-color:#3ecf8e;color:#3ecf8e;background:#0d2e1e}
.tab-bar{display:flex;gap:2px;background:#111;padding:2px;border-radius:8px}
.tab{padding:4px 12px;border-radius:6px;font-size:12px;cursor:pointer;color:#444;transition:all .15s}
.tab.active{background:#1e1e1e;color:#f0f0f0}

/* Metrics */
.metrics{display:flex;gap:1px;background:#1a1a1a;flex-shrink:0}
.metric{flex:1;padding:10px 20px;background:#0c0c0c;border-right:1px solid #1a1a1a}
.metric:last-child{border-right:none}
.metric-val{font-size:22px;font-weight:600}
.metric-val.green{color:#3ecf8e}
.metric-val.amber{color:#f0a130}
.metric-val.blue{color:#7aabff}
.metric-label{font-size:10px;color:#444;margin-top:1px;letter-spacing:.5px;text-transform:uppercase}

/* Alert modal — for staff/bill calls */
.alert-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.alert-overlay.show{opacity:1;pointer-events:all}
.alert-box{background:#161616;border-radius:16px;padding:32px 40px;text-align:center;max-width:360px;width:90%;animation:alertIn .25s ease}
@keyframes alertIn{from{transform:scale(.9)}to{transform:scale(1)}}
.alert-box.staff{border:2px solid #f0a130;box-shadow:0 0 40px #f0a13044}
.alert-box.cuenta{border:2px solid #7aabff;box-shadow:0 0 40px #7aabff44}
.alert-icon{font-size:48px;margin-bottom:12px}
.alert-title{font-size:22px;font-weight:600;margin-bottom:6px}
.alert-sub{font-size:14px;color:#888;margin-bottom:24px;line-height:1.5}
.alert-btn{padding:12px 32px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;width:100%}
.alert-btn.staff{background:#f0a130;color:#0c0c0c}
.alert-btn.cuenta{background:#7aabff;color:#0c0c0c}

/* Main */
.main{display:flex;flex:1;overflow:hidden}
.grid-area{flex:1;overflow-y:auto;padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;align-content:start}
.grid-area::-webkit-scrollbar{width:4px}
.grid-area::-webkit-scrollbar-thumb{background:#222;border-radius:2px}

/* History view */
.history-area{flex:1;overflow-y:auto;padding:20px}
.history-area::-webkit-scrollbar{width:4px}
.history-area::-webkit-scrollbar-thumb{background:#222}
.hist-date{font-size:11px;color:#444;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #1a1a1a}
.hist-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.hist-stat{background:#141414;border-radius:10px;padding:12px 16px}
.hist-stat-val{font-size:20px;font-weight:600;color:#f0f0f0}
.hist-stat-label{font-size:10px;color:#444;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.hist-orders{display:flex;flex-direction:column;gap:6px}
.hist-order{background:#141414;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:12px}
.hist-mesa{font-size:13px;font-weight:600;color:#f0f0f0;min-width:54px}
.hist-items{flex:1;font-size:12px;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-total{font-size:13px;font-weight:500;color:#3ecf8e;min-width:60px;text-align:right}
.hist-time{font-size:11px;color:#333;min-width:40px;text-align:right}

/* Empty */
.empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#222;padding:80px 0;text-align:center}
.empty-icon{font-size:52px}
.empty-text{font-size:15px}
.empty-sub{font-size:12px;color:#2a2a2a}

/* Cards */
.card{background:#161616;border:1px solid #222;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;animation:ci .25s ease}
@keyframes ci{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card.new{border-color:#1a3a6a}
.card.warn{border-color:#3a2a00}
.card.late{border-color:#3a0a0a}
.card.done{opacity:.28;filter:grayscale(1)}
.card.has-staff{border-color:#f0a130;animation:flashAmber 1s ease infinite alternate}
.card.has-bill{border-color:#7aabff;animation:flashBlue 1s ease infinite alternate}
@keyframes flashAmber{from{box-shadow:none}to{box-shadow:0 0 16px #f0a13066}}
@keyframes flashBlue{from{box-shadow:none}to{box-shadow:0 0 16px #7aabff66}}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #1e1e1e}
.card-mesa{font-size:15px;font-weight:700;color:#f0f0f0}
.card-badges{display:flex;align-items:center;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}
.badge-new{background:#0d1a3a;color:#7aabff}
.badge-staff{background:#3a1a00;color:#f0a130;animation:badgePulse .8s ease infinite alternate}
.badge-bill{background:#0d1a3a;color:#7aabff;animation:badgePulse .8s ease infinite alternate}
@keyframes badgePulse{from{opacity:1}to{opacity:.5}}
.timer{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px}
.timer.ok{background:#0d2e1e;color:#3ecf8e}
.timer.warn{background:#2e1a00;color:#f0a130}
.timer.late{background:#2e0808;color:#f05a5a}
.card-items{padding:10px 12px;flex:1}
.card-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid #1c1c1c;cursor:pointer}
.card-item:last-child{border-bottom:none}
.card-item.done-item .item-name{text-decoration:line-through;opacity:.4}
.card-item.done-item .item-qty{opacity:.4}
.item-check{width:18px;height:18px;border-radius:50%;border:1.5px solid #333;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.item-check.checked{background:#3ecf8e;border-color:#3ecf8e}
.item-check.checked::after{content:"✓";font-size:10px;color:#0c0c0c;font-weight:700}
.item-qty{font-size:14px;font-weight:700;color:#f0f0f0;min-width:22px;flex-shrink:0}
.item-body{flex:1;min-width:0}
.item-name{font-size:13px;color:#ccc;line-height:1.3}
.item-comment{font-size:10px;color:#f0a130;font-style:italic;margin-top:3px;background:#1e1200;padding:2px 6px;border-radius:4px;display:inline-block}
.card-ftr{display:flex;align-items:center;gap:8px;padding:9px 12px;border-top:1px solid #1e1e1e}
.btn-done{flex:1;padding:8px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.btn-done.mark{background:#f0f0f0;color:#0c0c0c}
.btn-done.mark:hover{background:#fff}
.btn-done.unmark{background:#1e1e1e;color:#555;border:1px solid #2a2a2a}
.card-total{font-size:12px;color:#333;min-width:54px;text-align:right;font-weight:500}

/* Sidebar */
.sidebar{width:230px;flex-shrink:0;background:#080808;border-left:1px solid #141414;display:flex;flex-direction:column;overflow:hidden}
.sb-hdr{padding:10px 14px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#333;border-bottom:1px solid #111;flex-shrink:0}
.sb-scroll{flex:1;overflow-y:auto;padding:8px 14px}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-empty{font-size:11px;color:#2a2a2a;padding:6px 0}
.log-item{display:flex;gap:6px;padding:6px 0;border-bottom:1px solid #0e0e0e;font-size:11px}
.log-item:last-child{border-bottom:none}
.log-time{color:#2a2a2a;flex-shrink:0;margin-top:1px}
.log-msg{color:#444;line-height:1.4}
</style>
</head>
<body>
<div id="app">

<!-- Alert modal -->
<div class="alert-overlay" id="alert-overlay">
  <div class="alert-box" id="alert-box">
    <div class="alert-icon" id="alert-icon"></div>
    <div class="alert-title" id="alert-title"></div>
    <div class="alert-sub" id="alert-sub"></div>
    <button class="alert-btn" id="alert-btn" onclick="dismissAlert()">Entendido</button>
  </div>
</div>

<div class="topbar">
  <div class="tb-left">
    <div class="tb-name" id="tb-name">Panel de cocina</div>
    <div class="tab-bar">
      <div class="tab active" onclick="setView('live',this)">En vivo</div>
      <div class="tab" onclick="setView('history',this)">Historial</div>
    </div>
  </div>
  <div class="tb-right">
    <button class="btn-sm" id="sound-btn" onclick="toggleSound()">🔔 Sonido</button>
    <button class="btn-sm" onclick="loadData()">↻ Actualizar</button>
    <div class="live-badge"><div class="pulse"></div>En vivo</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</div>

<div class="metrics">
  <div class="metric"><div class="metric-val" id="m-activas">0</div><div class="metric-label">Mesas activas</div></div>
  <div class="metric"><div class="metric-val green" id="m-listos">0</div><div class="metric-label">Completados hoy</div></div>
  <div class="metric"><div class="metric-val amber" id="m-notifs">0</div><div class="metric-label">Notificaciones</div></div>
  <div class="metric"><div class="metric-val blue" id="m-ventas">$0</div><div class="metric-label">Ventas hoy</div></div>
</div>

<div class="main">

  <!-- Live view -->
  <div id="view-live" style="flex:1;display:flex;overflow:hidden">
    <div class="grid-area" id="grid">
      <div class="empty" id="empty">
        <div class="empty-icon">🍽</div>
        <div class="empty-text">Esperando pedidos...</div>
        <div class="empty-sub">Los pedidos aparecen aquí en tiempo real</div>
      </div>
    </div>
    <div class="sidebar">
      <div class="sb-hdr">Actividad</div>
      <div class="sb-scroll" id="activity"><div class="sb-empty">Sin actividad aún</div></div>
    </div>
  </div>

  <!-- History view -->
  <div id="view-history" style="flex:1;display:none;overflow:hidden">
    <div class="history-area" id="history-area">
      <div class="empty" style="display:flex">
        <div class="empty-icon">📋</div>
        <div class="empty-text">Sin historial todavía</div>
        <div class="empty-sub">Los pedidos completados aparecerán aquí</div>
      </div>
    </div>
  </div>

</div>
</div>

<script>
var API   = 'https://web-production-da05.up.railway.app';
var RESTO = new URLSearchParams(window.location.search).get('resto') || 'maison';

var orders     = {};
var totalDone  = 0;
var totalVentas= 0;
var seenOrders = new Set();
var seenNotifs = new Set();
var soundOn    = true;
var alertQueue = [];
var alertShowing = false;
var currentView= 'live';

// ── Audio ─────────────────────────────────────────────────────────────────
var AudioCtx = window.AudioContext || window.webkitAudioContext;
var audioCtx = null;

function getAudioCtx(){
  if(!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playBeep(freq, dur, type){
  if(!soundOn) return;
  try{
    var ctx = getAudioCtx();
    var osc = ctx.createOscillator();
    var gain= ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  }catch(e){}
}

function playNewOrder(){
  playBeep(880, 0.15); setTimeout(function(){playBeep(1100,0.2);},150);
}
function playStaff(){
  playBeep(660,0.2); setTimeout(function(){playBeep(660,0.2);},220); setTimeout(function(){playBeep(880,0.3);},440);
}
function playCuenta(){
  playBeep(440,0.15); setTimeout(function(){playBeep(660,0.15);},160); setTimeout(function(){playBeep(880,0.25);},320);
}

function toggleSound(){
  // Unlock audio context on first user interaction
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  soundOn = !soundOn;
  var btn = document.getElementById('sound-btn');
  btn.textContent = soundOn ? '🔔 Sonido' : '🔕 Silencio';
  btn.classList.toggle('active', soundOn);
}

// ── Clock ─────────────────────────────────────────────────────────────────
setInterval(function(){
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
},1000);

// Timer tick every minute
setInterval(function(){
  Object.values(orders).forEach(function(o){ if(!o.done) o.mins++; });
  renderGrid();
},60000);

// Auto-refresh
setInterval(loadData, 8000);

// Init
document.getElementById('tb-name').textContent =
  'Cocina · ' + RESTO.charAt(0).toUpperCase() + RESTO.slice(1);
document.getElementById('sound-btn').classList.add('active');
loadData();

// ── API ───────────────────────────────────────────────────────────────────
async function loadData(){
  try{
    var [pr, nr] = await Promise.all([
      fetch(API+'/api/pedidos/'+RESTO),
      fetch(API+'/api/notificaciones/'+RESTO),
    ]);
    var pedidos = await pr.json();
    var notifs  = await nr.json();
    processPedidos(pedidos);
    processNotifs(notifs);
    renderGrid();
    renderMetrics(notifs.length);
    if(currentView==='history') renderHistory(pedidos);
  }catch(e){ console.error(e); }
}

function processPedidos(list){
  list.forEach(function(p){
    if(!orders[p.id]){
      var isNew = !seenOrders.has(p.id);
      orders[p.id]={
        id:p.id, mesa:p.mesa, items:p.items||[], total:p.total,
        mins: Math.floor((Date.now()-new Date(p.creado_en).getTime())/60000),
        done: p.estado==='listo'||p.estado==='cerrado',
        checkedItems:{}, isNew:isNew,
        hasStaff:false, hasBill:false,
        creado_en: p.creado_en,
      };
      if(isNew){
        if(!orders[p.id].done){ playNewOrder(); log('📦 Mesa '+p.mesa+' · nuevo pedido'); }
        seenOrders.add(p.id);
        if(orders[p.id].done){ totalDone++; totalVentas+=p.total; }
      }
    } else {
      var wasDone = orders[p.id].done;
      orders[p.id].done = p.estado==='listo'||p.estado==='cerrado';
      if(!wasDone && orders[p.id].done){ totalDone++; totalVentas+=p.total; }
    }
  });
}

function processNotifs(list){
  list.forEach(function(n){
    if(seenNotifs.has(n.id)) return;
    seenNotifs.add(n.id);
    Object.values(orders).forEach(function(o){
      if(o.mesa===n.mesa){
        if(n.tipo==='personal') o.hasStaff=true;
        if(n.tipo==='cuenta')   o.hasBill=true;
      }
    });
    if(n.tipo==='personal'){
      playStaff();
      queueAlert('staff','🙋','Mesa '+n.mesa+' llama al personal','El mozo debe acercarse a la mesa '+n.mesa+'.');
      log('🙋 Mesa '+n.mesa+' · llama al personal');
    } else {
      playCuenta();
      queueAlert('cuenta','💳','Mesa '+n.mesa+' pide la cuenta','Llevar la cuenta a la mesa '+n.mesa+'.');
      log('💳 Mesa '+n.mesa+' · pide la cuenta');
    }
    renderGrid();
  });
}

// ── Alert system ──────────────────────────────────────────────────────────
function queueAlert(tipo, icon, title, sub){
  alertQueue.push({tipo,icon,title,sub});
  if(!alertShowing) showNextAlert();
}

function showNextAlert(){
  if(alertQueue.length===0){ alertShowing=false; return; }
  alertShowing=true;
  var a = alertQueue.shift();
  var overlay = document.getElementById('alert-overlay');
  var box     = document.getElementById('alert-box');
  var btn     = document.getElementById('alert-btn');
  document.getElementById('alert-icon').textContent  = a.icon;
  document.getElementById('alert-title').textContent = a.title;
  document.getElementById('alert-sub').textContent   = a.sub;
  box.className  = 'alert-box ' + a.tipo;
  btn.className  = 'alert-btn ' + a.tipo;
  overlay.classList.add('show');
}

function dismissAlert(){
  document.getElementById('alert-overlay').classList.remove('show');
  alertShowing=false;
  setTimeout(showNextAlert, 300);
}

async function markDone(id){
  var o=orders[id]; if(!o)return;
  o.done=!o.done; o.isNew=false; o.hasStaff=false; o.hasBill=false;
  if(o.done){ totalDone++; totalVentas+=o.total; log('✓ Mesa '+o.mesa+' completada · '+fmt(o.total)); }
  else { if(totalDone>0)totalDone--; totalVentas-=o.total; }
  renderGrid(); renderMetrics(seenNotifs.size);
  try{
    await fetch(API+'/api/pedidos/'+id,{
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({estado:o.done?'listo':'pendiente'}),
    });
  }catch(e){}
}

// ── History ───────────────────────────────────────────────────────────────
function renderHistory(pedidos){
  var area = document.getElementById('history-area');
  var done = pedidos.filter(function(p){ return p.estado==='listo'||p.estado==='cerrado'; });
  if(done.length===0){
    area.innerHTML='<div class="empty" style="display:flex"><div class="empty-icon">📋</div><div class="empty-text">Sin pedidos completados</div></div>';
    return;
  }

  // Group by date
  var byDate = {};
  done.forEach(function(p){
    var d = new Date(p.creado_en).toLocaleDateString('es-UY',{weekday:'long',day:'numeric',month:'long'});
    if(!byDate[d]) byDate[d]=[];
    byDate[d].push(p);
  });

  area.innerHTML = '';
  Object.keys(byDate).forEach(function(date){
    var list = byDate[date];
    var totalMesas  = new Set(list.map(function(p){return p.mesa;})).size;
    var totalImporte= list.reduce(function(s,p){return s+p.total;},0);
    var totalItems  = list.reduce(function(s,p){return s+(p.items||[]).reduce(function(ss,i){return ss+i.qty;},0);},0);

    var sec = document.createElement('div');
    sec.style.marginBottom='24px';
    sec.innerHTML=
      '<div class="hist-date">'+date.toUpperCase()+'</div>'+
      '<div class="hist-summary">'+
        '<div class="hist-stat"><div class="hist-stat-val">'+list.length+'</div><div class="hist-stat-label">Pedidos</div></div>'+
        '<div class="hist-stat"><div class="hist-stat-val">'+totalMesas+'</div><div class="hist-stat-label">Mesas</div></div>'+
        '<div class="hist-stat"><div class="hist-stat-val" style="color:#3ecf8e">'+fmt(totalImporte)+'</div><div class="hist-stat-label">Total</div></div>'+
      '</div>'+
      '<div class="hist-orders">'+
        list.map(function(p){
          var t=new Date(p.creado_en).toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit'});
          var items=(p.items||[]).map(function(i){return i.qty+'× '+i.name;}).join(', ');
          return'<div class="hist-order">'+
            '<div class="hist-mesa">Mesa '+p.mesa+'</div>'+
            '<div class="hist-items">'+items+'</div>'+
            '<div class="hist-total">'+fmt(p.total)+'</div>'+
            '<div class="hist-time">'+t+'</div>'+
          '</div>';
        }).join('')+
      '</div>';
    area.appendChild(sec);
  });
}

// ── View toggle ───────────────────────────────────────────────────────────
function setView(view, el){
  currentView = view;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('view-live').style.display    = view==='live'    ? 'flex' : 'none';
  document.getElementById('view-history').style.display = view==='history' ? 'flex' : 'none';
  if(view==='history') loadData();
}

// ── Activity log ──────────────────────────────────────────────────────────
function log(text){
  var el=document.getElementById('activity');
  if(el.querySelector('.sb-empty')) el.innerHTML='';
  var now=new Date().toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit'});
  var d=document.createElement('div'); d.className='log-item';
  d.innerHTML='<span class="log-time">'+now+'</span><span class="log-msg">'+text+'</span>';
  el.insertBefore(d,el.firstChild);
}

// ── Render grid ───────────────────────────────────────────────────────────
function tc(m){ return m<12?'ok':m<25?'warn':'late'; }
function fmt(n){ return'$'+Math.round(n).toLocaleString('es-UY'); }

function renderGrid(){
  var grid=document.getElementById('grid');
  var empty=document.getElementById('empty');
  var keys=Object.keys(orders);
  if(keys.length===0){ empty.style.display='flex'; return; }
  empty.style.display='none';
  grid.querySelectorAll('.card').forEach(function(c){ if(!orders[c.dataset.id])c.remove(); });

  keys.sort(function(a,b){
    var oa=orders[a], ob=orders[b];
    if(oa.done!==ob.done) return oa.done?1:-1;
    // Urgent alerts first
    var urgA=(oa.hasStaff||oa.hasBill)?0:1, urgB=(ob.hasStaff||ob.hasBill)?0:1;
    if(urgA!==urgB) return urgA-urgB;
    return oa.mins-ob.mins;
  });

  keys.forEach(function(id,idx){
    var o=orders[id];
    var t=tc(o.mins);
    var ex=grid.querySelector('[data-id="'+id+'"]');
    if(ex) ex.remove();

    var card=document.createElement('div');
    card.className='card'+(o.done?' done':'')+(o.isNew&&!o.done?' new':'')
      +(!o.done&&t==='warn'?' warn':'')
      +(!o.done&&t==='late'?' late':'')
      +(o.hasStaff&&!o.done?' has-staff':'')
      +(o.hasBill&&!o.done?' has-bill':'');
    card.dataset.id=id;

    var badges='';
    if(o.isNew&&!o.done)    badges+='<span class="badge badge-new">nuevo</span>';
    if(o.hasStaff&&!o.done) badges+='<span class="badge badge-staff">🙋 llama</span>';
    if(o.hasBill&&!o.done)  badges+='<span class="badge badge-bill">💳 cuenta</span>';
    var timerHtml=o.done?'<span class="timer ok">✓ listo</span>':'<span class="timer '+t+'">'+o.mins+' min</span>';

    var itemsHtml=(o.items||[]).map(function(item,ii){
      var checked=!!o.checkedItems[ii];
      return'<div class="card-item'+(checked?' done-item':'')+'" data-id="'+id+'" data-ii="'+ii+'">'+
        '<div class="item-check'+(checked?' checked':'')+'"></div>'+
        '<span class="item-qty">'+item.qty+'×</span>'+
        '<div class="item-body">'+
          '<div class="item-name">'+item.name+'</div>'+
          (item.comment?'<div class="item-comment">'+item.comment+'</div>':'')+
        '</div>'+
      '</div>';
    }).join('');

    card.innerHTML=
      '<div class="card-hdr">'+
        '<span class="card-mesa">Mesa '+o.mesa+'</span>'+
        '<div class="card-badges">'+badges+timerHtml+'</div>'+
      '</div>'+
      '<div class="card-items">'+(itemsHtml||'<div style="font-size:11px;color:#333;padding:6px 0">Sin ítems</div>')+'</div>'+
      '<div class="card-ftr">'+
        '<button class="btn-done '+(o.done?'unmark':'mark')+'" data-id="'+id+'">'+
          (o.done?'Reabrir':'Marcar listo')+
        '</button>'+
        '<div class="card-total">'+fmt(o.total)+'</div>'+
      '</div>';

    card.querySelectorAll('.card-item').forEach(function(row){
      row.addEventListener('click',function(){
        orders[this.dataset.id].checkedItems[parseInt(this.dataset.ii)]=
          !orders[this.dataset.id].checkedItems[parseInt(this.dataset.ii)];
        renderGrid();
      });
    });
    card.querySelector('.btn-done').addEventListener('click',function(e){
      e.stopPropagation(); markDone(this.dataset.id);
    });

    var cards=grid.querySelectorAll('.card');
    if(cards[idx]) grid.insertBefore(card,cards[idx]); else grid.appendChild(card);
  });
}

function renderMetrics(notifCount){
  var active=Object.values(orders).filter(function(o){return!o.done;}).length;
  document.getElementById('m-activas').textContent=active;
  document.getElementById('m-listos').textContent=totalDone;
  document.getElementById('m-notifs').textContent=notifCount;
  document.getElementById('m-ventas').textContent=fmt(totalVentas);
}
</script>
</body>
</html>
